<html>
<head>
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>
<body>
<div class="container-fluid ">
<div class="container-fluid px-0 ">
<img src="/static/image/c.jpg" class="d-block w-100" alt="..." style="height:480px;">
</div>

<div class="container center">
<h1 class="text-center"> Contact Us </h1>

<form method="post" action= "/contact/">
{% csrf_token %}
<div class="mb-3">
  <label for="name" class="form-label">Name</label>
  <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name">
</div>
<div class="mb-3">
  <label for="phone" class="form-label">Mobile Number</label>
  <input type="phone" class="form-control" id="phone" name="phone" placeholder="Enter your contact Number">
</div>
<div class="mb-3">
  <label for="desc" class="form-label">Tell me about what you want to contact me</label>
  <textarea class="form-control" id="desc" name="desc" rows="3"></textarea>
  
</div>
<div class="mb-3">
<button type="submit" class="btn btn-outline-danger">Submit</button>
</div>
</form>
</div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>

<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
</body>
</html>
